<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Dashboard</title>
   <link rel="stylesheet" href="css/style.css">
   <link rel="stylesheet" href="css/components.css">
   <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <div class="scanline"></div>
  
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>

   <div class="watermark" style="top: 40px; left: 40px; transform: rotate(-10deg);">四十二</div>

   <!-- Post-it Note -->
   <div class="post-it-note" id="quotePostIt">
     <div class="post-it-content">
       <p class="post-it-quote">"The difference between a novice and a master is that the master has failed more times than the novice has even tried."</p>
       <div class="tape tape-top"></div>
     </div>
   </div>

   <div class="dashboard-page page-container">
    <div class="dashboard-header">
      <div class="greeting-row">
        <img src="https://avatars.githubusercontent.com/u/185643713?v=4" alt="Avatar" class="user-avatar">
        <div>
          <p class="subtitle">HEADQUARTERS</p>
          <h1><span id="userName">Student</span></h1>
          <p class="date" id="currentDate"></p>
        </div>
      </div>
      <div class="header-right">
        
      </div>
    </div>

    <div class="stats-grid">
      <div class="glass-card stat-card">
        <div class="icon">⚔</div>
        <div class="value" id="questsDone">0</div>
        <div class="label">Projects Done</div>
      </div>
      <div class="glass-card stat-card">
        <div class="icon">✦</div>
        <div class="value" id="totalXP">0</div>
        <div class="label">XP Points</div>
      </div>
      <div class="glass-card stat-card">
        <div class="icon">◎</div>
        <div class="value" id="toolsUsed">3</div>
        <div class="label">Tools Used</div>
      </div>
      <div class="glass-card stat-card">
        <div class="icon">◈</div>
        <div class="value" id="dayStreak">1</div>
        <div class="label">Day Streak</div>
      </div>
    </div>

     <div class="tools-section">
      <h2>AI Tools</h2>
      
      <div class="glass-card tool-card" onclick="window.location.href='ai-tools.html'" style="border-color: var(--neon-yellow);">
        <div class="tool-icon">🛠️</div>
        <div class="tool-info">
          <div class="tool-title">
            AI Tools Hub
            <span class="rank-badge rank-s">S</span>
          </div>
          <div class="tool-desc">All AI tools in one consolidated hub</div>
          <div class="tool-stats" id="toolsHubStats">-</div>
        </div>
        <button class="btn-secondary launch-btn">Launch →</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      if (!checkAuth()) return;
      
      const user = getUser();
      document.getElementById('userName').textContent = user.login;
      
      updateDate();
      loadStats();
    });

    function updateDate() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
      document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
    }

    function loadStats() {
      const user = getUser();
      const completed = JSON.parse(localStorage.getItem('projects_completed') || '[]');
      const loginDate = user?.loginDate || Date.now();
      const days = Math.max(1, Math.floor((Date.now() - loginDate) / (1000 * 60 * 60 * 24)));
      
      const xpValues = {
        'libft': 375, 'ft_printf': 490, 'get_next_line': 420, 'born2beroot': 350,
        'so_long': 350, 'push_swap': 475, 'pipex': 350, 'minitalk': 350,
        'minishell': 490, 'philosophers': 420, 'netpractice': 300,
        'cub3d': 490, 'inception': 490
      };
      
      let totalXP = 0;
      completed.forEach(p => {
        if (xpValues[p.id]) totalXP += xpValues[p.id];
      });
      
      document.getElementById('questsDone').textContent = completed.length;
      document.getElementById('totalXP').textContent = totalXP;
      document.getElementById('dayStreak').textContent = days;
      
       const analyzerUses = parseInt(localStorage.getItem('analyzer_uses') || '0');
       const testerUses = parseInt(localStorage.getItem('tester_uses') || '0');
       const chatMessages = parseInt(localStorage.getItem('chat_messages') || '0');
       const codeReviews = parseInt(localStorage.getItem('code_reviews') || '0');
       
       if (document.getElementById('analyzerStats')) {
         document.getElementById('analyzerStats').textContent = `${analyzerUses} uses`;
       }
       if (document.getElementById('testerStats')) {
         document.getElementById('testerStats').textContent = `${testerUses} uses`;
       }
       if (document.getElementById('chatStats')) {
         document.getElementById('chatStats').textContent = `${chatMessages} messages`;
       }
       if (document.getElementById('toolsHubStats')) {
         const totalToolUses = analyzerUses + testerUses + chatMessages + codeReviews;
         document.getElementById('toolsHubStats').textContent = `${totalToolUses} total uses`;
       }
       document.getElementById('toolsUsed').textContent = analyzerUses + testerUses + chatMessages + codeReviews;
    }

    function logout() {
      clearData();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

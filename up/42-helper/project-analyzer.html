<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Project Analyzer</title>
   <link rel="stylesheet" href="css/style.css">
   <link rel="stylesheet" href="css/components.css">
   <link rel="icon" type="image/svg+xml" href="favicon.svg">
   <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    .analyzer-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 30px 20px 120px;
    }
    
    .analyzer-card {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-glow);
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(255,45,120,0.1);
    }
    
    .analyzer-hero {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .analyzer-hero h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .analyzer-hero .subtitle {
      color: var(--text-muted);
      font-size: 15px;
    }
    
    .analyzer-hero .rank-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 16px;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
      border-radius: 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: white;
      box-shadow: 0 0 20px rgba(255,45,120,0.4);
    }
    
    .upload-area {
      border: 2px dashed var(--border-glow);
      border-radius: 16px;
      padding: 50px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .upload-area:hover {
      border-color: var(--neon-pink);
      background: rgba(255,45,120,0.05);
    }
    
    .upload-area.dragover {
      border-style: solid;
      border-color: var(--neon-pink);
      background: rgba(255,45,120,0.1);
    }
    
    .upload-area .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }
    
    .upload-area .label {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .upload-area .hint {
      color: var(--text-muted);
      font-size: 13px;
    }
    
    .file-selected {
      display: none;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding: 16px 20px;
      background: rgba(255,45,120,0.1);
      border: 1px solid var(--neon-pink);
      border-radius: 12px;
    }
    
    .file-selected.show {
      display: flex;
    }
    
    .file-selected .info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .file-selected .badge {
      background: var(--neon-pink);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
    }
    
    .file-selected .clear {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 20px;
    }
    
    .analyze-btn {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      font-size: 16px;
    }
    
    .analyze-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Loading State */
    .loading-state {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    
    .loading-state .spinner {
      width: 60px;
      height: 60px;
      margin: 0 auto 24px;
      border: 4px solid rgba(255,45,120,0.2);
      border-top-color: var(--neon-pink);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-state .text-main {
      color: var(--neon-pink);
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      margin-bottom: 8px;
    }
    
    .loading-state .text-sub {
      color: var(--text-muted);
      font-size: 14px;
    }
    
    /* Result State */
    .result-state {
      display: none;
    }
    
    .result-header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border-subtle);
    }
    
    .result-header .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      color: var(--neon-pink);
      text-shadow: 0 0 20px var(--neon-pink);
      margin-bottom: 16px;
    }
    
    .result-header .time {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      color: var(--neon-yellow);
      text-shadow: 0 0 15px var(--neon-yellow);
    }
    
    .result-header .description {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
      margin-top: 16px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .task-list {
      margin-bottom: 30px;
    }
    
    .task-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(255,45,120,0.08);
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,45,120,0.15);
      transition: all 0.2s ease;
    }
    
    .task-item:hover {
      background: rgba(255,45,120,0.12);
      transform: translateX(4px);
    }
    
    .task-item .day-num {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    
    .task-item .day-task {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.4;
    }
    
    .empty-tasks {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
    }
    
    .new-btn {
      width: 100%;
      padding: 16px;
      font-size: 15px;
    }
    
    /* Hide/Show Logic */
    .upload-state { display: block; }
    .loading-state { display: block; }
    .result-state { display: block; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="scanline"></div>
  
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>

  <div class="watermark" style="top: 30px; right: 40px; transform: rotate(-10deg); font-size: 80px; opacity: 0.03;">分析</div>

  <div class="analyzer-container">
    <!-- Header -->
    <div class="analyzer-hero">
      <h1>Project Analyzer</h1>
      <p class="subtitle">AI-powered analysis of your 42 projects</p>
      <div class="rank-badge">A RANK</div>
    </div>

    <!-- Upload State -->
    <div class="analyzer-card upload-state" id="uploadState">
      <div class="upload-area" id="uploadArea">
        <div class="icon">📄</div>
        <div class="label">Drop your subject file here</div>
        <div class="hint">PDF file, max 10MB</div>
        <input type="file" id="fileInput" accept=".pdf" style="display:none">
      </div>

      <div class="file-selected" id="fileSelected">
        <div class="info">
          <span class="badge">FILE</span>
          <span id="fileName">filename.pdf</span>
        </div>
        <button class="clear" onclick="clearFile()">✕</button>
      </div>

      <button class="btn-primary analyze-btn" id="analyzeBtn" onclick="analyze()" disabled>
        ⚡ Analyze Project
      </button>
    </div>

    <!-- Loading State -->
    <div class="analyzer-card loading-state hidden" id="loadingState">
      <div class="spinner"></div>
      <div class="text-main">AI is analyzing...</div>
      <div class="text-sub" id="loadingText">Processing your project</div>
    </div>

    <!-- Result State -->
    <div class="analyzer-card result-state hidden" id="resultState">
      <div class="result-header">
        <div class="title" id="resultTitle">PROJECT NAME</div>
        <div class="time" id="resultTime">Estimated Time</div>
        <div class="description" id="resultDesc"></div>
      </div>

      <div class="task-list" id="taskList">
        <!-- Tasks will be inserted here -->
      </div>

      <button class="btn-primary new-btn" onclick="resetAnalyzer()">
        🔄 Analyze Another Project
      </button>
    </div>
  </div>

  <!-- Floating Navigation -->
  <nav class="tokyo-nav">
    <a href="dashboard.html" class="nav-pill" data-label="Home">🏠</a>
    <a href="project-analyzer.html" class="nav-pill active" data-label="Analyze">🔍</a>
    <a href="tester-project.html" class="nav-pill" data-label="Test">🧪</a>
    <a href="ai-chat.html" class="nav-pill" data-label="AI">🤖</a>
    <button onclick="logout()" class="nav-pill" data-label="Exit">🚪</button>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ai.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const loadingTexts = ['Reading your file...', 'Analyzing requirements...', 'Generating task plan...', 'Finalizing...'];
    let loadingIndex = 0;
    let currentInterval = null;

    document.addEventListener("DOMContentLoaded", function() {
      if (!checkAuth()) return;

      // Drag and drop handlers
      const uploadArea = document.getElementById('uploadArea');
      
      uploadArea.addEventListener('click', () => document.getElementById('fileInput').click());
      
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      });
      
      uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
      });
      
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          document.getElementById('fileInput').files = files;
          handleFileSelect(files[0]);
        }
      });

      document.getElementById('fileInput').addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          handleFileSelect(e.target.files[0]);
        }
      });
    });

    function handleFileSelect(file) {
      document.getElementById('fileName').textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + 'KB)';
      document.getElementById('fileSelected').classList.add('show');
      document.getElementById('analyzeBtn').disabled = false;
    }

    function clearFile() {
      document.getElementById('fileInput').value = '';
      document.getElementById('fileSelected').classList.remove('show');
      document.getElementById('analyzeBtn').disabled = true;
    }

    async function analyze() {
      const fileInput = document.getElementById('fileInput');
      if (!fileInput.files[0]) {
        showError('Please select a file first');
        return;
      }

      showLoadingState();

      try {
        let text = '';
        const file = fileInput.files[0];
        
        if (file.name.endsWith('.pdf')) {
          text = await extractPDF(file);
        } else {
          text = await file.text();
        }
        
        if (text.length < 30) throw new Error('Could not read file. Please try a different file.');

        const PROMPT = `You are a 42 school expert. Analyze this project subject and create a practical study plan.

ANALYSIS RULES:
1. Find and use the EXACT project name from the subject (usually at the top or in the title)
2. Be realistic with hours - most 42 projects take 20-80 hours
3. Practical daily tasks (2-4 hours each day)

Respond in EXACT format below:

PROJECT: [USE THE EXACT NAME FROM SUBJECT FILE]
DIFFICULTY: [Easy/Medium/Hard]
KEY_TOPICS: [comma-separated concepts]
ESTIMATED_HOURS: [hours]
BONUS_WORTH: [yes/no]

DAILY_TASKS:
Day 1: [task]
Day 2: [task]
Day 3: [task]
Day 4: [task]
Day 5: [task]

TIPS:
- [tip]
- [tip]

Subject:\n${text.slice(0, 4000)}`;

        const response = await sendMessage(PROMPT);
        displayResult(response);
        
      } catch (e) {
        showError(e.message || 'Failed to analyze. Please try again.');
        showUploadState();
      }
    }

    async function extractPDF(file) {
      const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const items = await page.getTextContent();
        text += items.items.map(x => x.str).join(' ') + '\n';
      }
      return text;
    }

    function showLoadingState() {
      document.getElementById('uploadState').classList.add('hidden');
      document.getElementById('loadingState').classList.remove('hidden');
      document.getElementById('resultState').classList.add('hidden');
      
      loadingIndex = 0;
      currentInterval = setInterval(() => {
        document.getElementById('loadingText').textContent = loadingTexts[loadingIndex];
        loadingIndex = (loadingIndex + 1) % loadingTexts.length;
      }, 800);
    }

    function showUploadState() {
      if (currentInterval) clearInterval(currentInterval);
      document.getElementById('uploadState').classList.remove('hidden');
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('resultState').classList.add('hidden');
    }

    function showResultState() {
      if (currentInterval) clearInterval(currentInterval);
      document.getElementById('uploadState').classList.add('hidden');
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('resultState').classList.remove('hidden');
    }

     function displayResult(response) {
       showResultState();

       // Increment usage counter
       const uses = parseInt(localStorage.getItem('analyzer_uses') || '0');
       localStorage.setItem('analyzer_uses', uses + 1);

       // Parse PROJECT name
      const projectMatch = response.match(/PROJECT:\s*(.+?)(?:\n|$)/i);
      document.getElementById('resultTitle').textContent = projectMatch ? projectMatch[1].trim() : '42 Project';

      // Parse ESTIMATED_HOURS
      const hoursMatch = response.match(/ESTIMATED_HOURS:\s*(\d+)/i);
      const difficultyMatch = response.match(/DIFFICULTY:\s*(\w+)/i);
      const difficulty = difficultyMatch ? difficultyMatch[1].trim() : '';
      const hours = hoursMatch ? hoursMatch[1].trim() : '?';
      document.getElementById('resultTime').textContent = difficulty ? `${difficulty} • ${hours}h` : `${hours}h estimated`;

      // Parse KEY_TOPICS as description
      const topicsMatch = response.match(/KEY_TOPICS:\s*(.+?)(?:\n|$)/i);
      const topics = topicsMatch ? topicsMatch[1].trim() : '';
      if (topics) {
        document.getElementById('resultDesc').textContent = 'Key topics: ' + topics;
        document.getElementById('resultDesc').style.display = 'block';
      } else {
        document.getElementById('resultDesc').style.display = 'none';
      }

      // Parse Daily Tasks
      const taskList = document.getElementById('taskList');
      const dayMatches = [...response.matchAll(/Day (\d+):\s*(.+?)(?:\n|Day|\nTIPS|$)/gi)];
      
      if (dayMatches.length > 0) {
        let html = '';
        for (const match of dayMatches) {
          html += `
            <div class="task-item">
              <div class="day-num">${match[1]}</div>
              <div class="day-task">${match[2].trim()}</div>
            </div>
          `;
        }
        taskList.innerHTML = html;
      } else {
        taskList.innerHTML = '<div class="empty-tasks">No tasks generated. Try uploading a different subject file.</div>';
      }
    }

    function resetAnalyzer() {
      clearFile();
      showUploadState();
    }

    function logout() {
      clearData();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant - 42 Cursus Helper</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="scanline"></div>
  
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>

  <div class="watermark" style="top: 30px; right: 40px; transform: rotate(-10deg);">助手</div>

  <div class="chat-page page-container">
    <div class="chat-container">
      <div class="chat-header">
        <div class="header-left">
          <div class="chat-avatar">🤖</div>
          <div class="chat-info">
            <h2>AI Assistant</h2>
            <div class="status">◆ ONLINE</div>
          </div>
        </div>
        <div class="header-right">
          <button onclick="clearChat()" class="btn-secondary" style="padding: 8px 16px; font-size: 12px;">Clear</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
          <div class="icon">🤖</div>
          <h2>System Online</h2>
          <p>How can I assist you today?</p>
        </div>
      </div>

      <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('⚔ Norminette rules')">⚔ Norminette</button>
        <button class="quick-btn" onclick="sendQuick('◈ libft tips')">◈ libft</button>
        <button class="quick-btn" onclick="sendQuick('◎ Debug help')">◎ Debug</button>
        <button class="quick-btn" onclick="sendQuick('◆ push_swap')">◆ push_swap</button>
        <button class="quick-btn" onclick="sendQuick('◈ minishell tips')">◈ minishell</button>
        <button class="quick-btn" onclick="sendQuick('⌘ Git commands')">⌘ Git</button>
        <button class="quick-btn" onclick="sendQuick('🎓 exam02')">🎓 exam02</button>
      </div>

      <div class="chat-input-area">
        <span class="decor-icon">🌸</span>
        <input type="text" id="chatInput" class="form-input" placeholder="Ask the system..." maxlength="1000">
        <button onclick="handleSend()" class="send-btn" id="sendBtn">➤</button>
      </div>
      <div class="char-counter" id="charCounter">0 / 1000</div>
    </div>
  </div>

  <!-- Floating Navigation -->
  <nav class="tokyo-nav">
    <a href="dashboard.html" class="nav-pill" data-label="Home">🏠</a>
    <a href="project-analyzer.html" class="nav-pill" data-label="Analyze">🔍</a>
    <a href="tester-project.html" class="nav-pill" data-label="Test">🧪</a>
    <a href="ai-chat.html" class="nav-pill active" data-label="AI">🤖</a>
    <button onclick="logout()" class="nav-pill" data-label="Exit">🚪</button>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ai.js"></script>
  <script>
    const MAX_CHARS = 500;

    document.addEventListener("DOMContentLoaded", function() {
      if (!checkAuth()) return;
      
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const charCounter = document.getElementById('charCounter');

      chatInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleSend();
      });

      chatInput.addEventListener('input', function() {
        const len = chatInput.value.length;
        charCounter.textContent = `${len} / 1000`;
        
        if (len > MAX_CHARS) charCounter.classList.add('danger');
        else if (len > MAX_CHARS * 0.8) charCounter.classList.add('warning');
        else charCounter.classList.remove('warning', 'danger');
        
        sendBtn.disabled = !chatInput.value.trim();
      });
    });

    function handleSend() {
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const msg = chatInput.value.trim();

      if (!msg) return;
      if (msg.length > MAX_CHARS) {
        showError(`Max ${MAX_CHARS} characters`);
        return;
      }

      sendBtn.disabled = true;
      chatInput.value = '';

      addUserMessage(msg);
      showThinking();
      
      const count = parseInt(localStorage.getItem('chat_messages') || '0');
      localStorage.setItem('chat_messages', count + 1);

      sendMessage(msg).then(response => {
        hideThinking();
        addAIMessage(response);
      }).catch(error => {
        hideThinking();
        addAIMessage("Error: " + error.message);
      });

      sendBtn.disabled = false;
      chatInput.focus();
    }

    function sendQuick(question) {
      document.getElementById('chatInput').value = question;
      handleSend();
    }

    function addUserMessage(text) {
      const container = document.getElementById('chatMessages');
      const welcome = container.querySelector('.empty-state');
      if (welcome) welcome.remove();

      const html = `
        <div class="message-wrapper user">
          <div class="message-avatar">👤</div>
          <div>
            <div class="message-bubble">${escapeHtml(text)}</div>
            <div class="message-time">${formatTime(new Date())}</div>
          </div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function addAIMessage(text) {
      const container = document.getElementById('chatMessages');
      const formatted = formatMessage(text);

      const html = `
        <div class="message-wrapper ai">
          <div class="message-avatar">🤖</div>
          <div>
            <div class="message-bubble">${formatted}</div>
            <div class="message-time">${formatTime(new Date())}</div>
          </div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function showThinking() {
      const container = document.getElementById('chatMessages');
      container.insertAdjacentHTML('beforeend', `
        <div class="thinking" id="thinkingIndicator">
          <span></span><span></span><span></span>
        </div>
      `);
      scrollToBottom();
    }

    function hideThinking() {
      const el = document.getElementById('thinkingIndicator');
      if (el) el.remove();
    }

    function formatMessage(text) {
      if (!text) return '';
      text = escapeHtml(text);
      
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/```([\s\S]*?)```/g, '<div class="terminal"><div class="terminal-header"><span class="terminal-dot"></span><span class="terminal-dot"></span><span class="terminal-dot"></span><span class="terminal-title">bash</span></div><pre>$1</pre></div>');
      text = text.replace(/\n/g, '<br>');
      
      return text;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(date) {
      return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
    }

    function scrollToBottom() {
      const container = document.getElementById('chatMessages');
      container.scrollTop = container.scrollHeight;
    }

    function clearChat() {
      
      
      messages = [{
        role: "system",
        content: "You are a helpful AI assistant for 42 school students. Answer ONLY about 42 coding questions."
      }];
      
      document.getElementById('chatMessages').innerHTML = `
        <div class="empty-state">
          <div class="icon">🤖</div>
          <h2>System Online</h2>
          <p>How can I assist you today?</p>
        </div>
      `;
      showSuccess('Chat cleared');
    }

    function logout() {
      clearData();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

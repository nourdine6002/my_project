<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>42 Cursus Helper - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="scanline"></div>
  
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>
  <div class="sakura-petal"></div>

  <div class="watermark" style="top: 30px; right: 40px; transform: rotate(-15deg);">四十二</div>

  <div class="login-page">
    <div class="login-hero">
      <div class="big-42">42</div>
      <div class="subtitle-main">Cursus Helper</div>
      <div class="subtitle-jp">Your 42 Journey</div>
    </div>

    <div class="login-form-side">
      <div class="glass-card login-card">
        <div class="header-row">
          <img src="https://avatars.githubusercontent.com/u/185643713?v=4" alt="Avatar" class="avatar-img">
          <div>
            <div class="welcome-text">Welcome back,</div>
            <div class="username" id="displayUsername">Student</div>
          </div>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <span class="input-icon">👤</span>
            <input type="text" id="loginInput" class="form-input" placeholder="42 Username" required>
          </div>

          <div class="form-group">
            <span class="input-icon">🔒</span>
            <input type="password" id="passwordInput" class="form-input password-field" placeholder="Password" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
          </div>

          <div class="remember-row">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe">
              <div class="remember-checkbox"></div>
              <span>Remember me</span>
            </label>
          </div>

          <button type="submit" class="btn-primary login-btn" id="loginBtn">
            Authenticate →
          </button>

          <div class="login-error" id="loginError"></div>
        </form>

        <div class="login-footer">
          Made for 42 students • Tokyo Style
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const btn = document.querySelector('.password-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🔒';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    // Password typing effect
    const passwordInput = document.getElementById('passwordInput');
    passwordInput.addEventListener('input', function() {
      if (this.value.length > 0) {
        this.classList.add('typing');
        setTimeout(() => this.classList.remove('typing'), 500);
      }
    });

    // If not logged in, redirect to landing page
    if (!getUser()) {
      window.location.href = 'landing.html';
      return;
    }

    const VALID_USER = 'nodoulah';
    const VALID_PASS = 'Pop#2006husa';

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    const loginInput = document.getElementById('loginInput');
    loginInput.addEventListener('input', function() {
      document.getElementById('displayUsername').textContent = this.value.trim() || 'Student';
    });

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const login = document.getElementById('loginInput').value.trim();
      const password = document.getElementById('passwordInput').value;

      if (login !== VALID_USER || password !== VALID_PASS) {
        loginError.textContent = '✗ Invalid credentials';
        loginError.classList.add('show');
        return;
      }

      loginError.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner-btn"></span>Authenticating...';

      setTimeout(() => {
        const userData = {
          login: login,
          password: password,
          level: 0,
          campus: '',
          projects: [],
          skills: [],
          loginDate: Date.now()
        };

        if (saveUser(userData)) {
          window.location.href = 'dashboard.html';
        } else {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Authenticate →';
          loginError.textContent = '✗ Failed to save data';
          loginError.classList.add('show');
        }
      }, 1000);
    });
  </script>
</body>
</html>
